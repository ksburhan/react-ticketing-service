name: tests-tickets

on:
  pull_request:
    paths:
      - "tickets/**"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd tickets && npm install && npm run build && npm run test:ci
